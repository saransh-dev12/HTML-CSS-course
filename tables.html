<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table{
            border-collapse: collapse;
            text-align: center;
           
        }
        td, th{
            border: 1px solid black;
            padding: 10px;

        }
        tr:nth-child(even){
            background-color: #b8b3b3;

        }
    </style>
</head>
<body>
    <table style="width: 100%;">
        <colgroup>
            <col span="3" style="background-color: cadetblue;"/>
        </colgroup>
        <tr>
            <th>Country</th>
            <th>Country Code</th>
            <th>Email</th>
        </tr>
        <tr>
            <td>India</td>
            <td>IN</td>
            <td>india@google.com</td>
        </tr>
        <tr>
            <td>United States Of America</td>
            <td>USA</td>
            <td>USA@google.com</td>
        </tr>
        <tr>
            <td>Japan</td>
            <td>JP</td>
            <td>japan@google.com</td>
        </tr>
    </table>

    <table style="width: 100%">
    <table>
        <tr>
        <th colspan="4">Country</th>
        <td>india</td>
        <td>Japan</td>
    </tr>

    <tr>
        <th>Code</th>
        <td>IN</td>
        <Td>JP</Td>
    </tr>

    </table>

</body>
</html>
